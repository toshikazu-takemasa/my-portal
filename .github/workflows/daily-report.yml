name: 日報生成

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 日報ファイルを生成（再生成時は上書き）
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // JST で今日の日付を取得
            const jst  = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
            const y    = jst.getFullYear();
            const m    = String(jst.getMonth() + 1).padStart(2, '0');
            const d    = String(jst.getDate()).padStart(2, '0');
            const path = `vault/diary/${y}-${m}-${d}.md`;

            // vault/diary/テンプレート.md を本文の雛形として利用（先頭見出しは日付に差し替え）
            let templateBody = '';
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                path:  'vault/diary/テンプレート.md',
              });
              templateBody = Buffer.from(data.content, 'base64')
                .toString('utf8')
                .replace(/^# .*\n/, '')
                .trimStart();
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            const content = `# ${y}-${m}-${d}\n\n${templateBody}`;

            const encoded = Buffer.from(content).toString('base64');

            // 既存ファイルの SHA を取得（再生成時に上書きするために必要）
            let sha;
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                path,
              });
              sha = data.sha;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner:   context.repo.owner,
              repo:    context.repo.repo,
              path,
              message: sha ? '📝 日報を再生成' : '📝 日報を作成',
              content: encoded,
              sha,
            });

            core.info(`日報を${sha ? '再生成' : '作成'}しました: ${path}`);
