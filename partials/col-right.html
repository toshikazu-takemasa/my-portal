<!-- ===== Col 3: Right Column ===== -->
<div class="right-col" id="col-right">

  <div class="side-panel-head">
    <button class="side-close-btn" onclick="closeMobileSideMenu()">✕ 閉じる</button>
  </div>

  <!-- チェック/メモ サブタブ (PC/スマホ共通) -->
  <div class="side-tabs" id="side-tabs">
    <button class="side-tab active" id="stab-checklist" onclick="switchSideTab('checklist')">チェック</button>
    <button class="side-tab" id="stab-memo" onclick="switchSideTab('memo')">メモ</button>
  </div>

  <!-- 本日のチェックリスト（日記テンプレートから） -->
  <div class="card !bg-[var(--card-bg)] !rounded-[var(--radius-lg)] !pt-5 !pb-5 !px-[22px] !border !border-[var(--border)] !shadow-[0_2px_8px_rgba(0,0,0,0.04)] max-[768px]:!p-4 max-[768px]:!rounded-[var(--radius-md)]" id="daily-checklist-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;">
      <h2 style="margin-bottom:0;">📋 本日のチェックリスト</h2>
      <div style="display:flex;gap:6px;">
        <button class="quick-memo-btn" style="padding:5px 9px;font-size:0.72rem;" onclick="appendDailyChecklistToReport()">📝 反映</button>
        <button class="quick-memo-btn" style="padding:5px 9px;font-size:0.72rem;background:#f6f8fa;color:#24292f;" onclick="resetDailyChecklist()">クリア</button>
      </div>
    </div>
    <div id="daily-checklist-list-right" class="daily-checklist"></div>
  </div>

  <!-- メモ（主題ごとのカード形式・vault/memo.md の ## 見出し単位） -->
  <div class="card !bg-[var(--card-bg)] !rounded-[var(--radius-lg)] !pt-5 !pb-5 !px-[22px] !border !border-[var(--border)] !shadow-[0_2px_8px_rgba(0,0,0,0.04)] max-[768px]:!p-4 max-[768px]:!rounded-[var(--radius-md)] is-hidden" id="memo-tab-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;">
      <h2 style="margin-bottom:0;">📝 メモ</h2>
      <div style="display:flex;gap:6px;">
        <button class="quick-memo-btn" style="padding:5px 9px;font-size:0.72rem;background:#f6f8fa;color:#24292f;" title="再読み込み" onclick="loadMemoTab(true)">↻</button>
        <button class="quick-memo-btn" id="memo-mode-toggle" style="padding:5px 9px;font-size:0.72rem;background:#f6f8fa;color:#24292f;" title="カード表示とMD全体編集の切替" onclick="toggleMemoRawMode()">MD</button>
      </div>
    </div>

    <!-- カード一覧（アコーディオン） -->
    <div id="memo-tab-cards" class="memo-tab-cards"></div>

    <!-- 新規カード追加 -->
    <div id="memo-add-row" class="memo-add-row">
      <input id="memo-new-title" type="text" class="quick-memo-input" style="flex:1;min-width:0;"
        placeholder="＋ 新しいカード（例: 読書メモ / ADR）"
        onkeydown="if(event.key==='Enter')addMemoCard()">
      <button class="quick-memo-btn" onclick="addMemoCard()">追加</button>
    </div>

    <!-- MD全体編集モード（フォールバック） -->
    <textarea id="memo-tab-textarea" class="quick-memo-input is-hidden" oninput="markMemoDirty()"
      style="width:100%;min-height:280px;resize:vertical;line-height:1.6;padding:10px;box-sizing:border-box;" placeholder="自由記述..."></textarea>
    <div id="memo-raw-actions" class="is-hidden" style="margin-top:8px;">
      <button class="quick-memo-btn" style="width:100%;" onclick="saveMemoTab()">保存</button>
    </div>

    <div id="memo-tab-status" style="font-size:0.72rem;color:var(--text-sub);margin-top:6px;min-height:1.2em;"></div>
  </div>

</div><!-- /right-col -->

<script src="js/ui/daily-checklist.js?v=20260510"></script>
<script src="js/storage/memo-repository.js"></script>
<script src="js/ui/memo-tab.js?v=20260710"></script>
