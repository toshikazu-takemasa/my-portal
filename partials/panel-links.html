<!-- クイックリンクパネル -->
<div id="main-panel-links" class="is-hidden">
  <div class="links-grid" id="links-body">
    <!-- JS: renderAllLinks() で描画 -->
  </div>

  <div class="add-form is-hidden" id="add-link-form" style="margin-top:10px;">
    <div class="form-emoji-row">
      <input id="fl-emoji" type="text" placeholder="🔗" maxlength="2">
      <input id="fl-name" type="text" placeholder="サービス名">
    </div>
    <input id="fl-url" type="url" placeholder="https://...">
    <input id="fl-cat" type="text" placeholder="カテゴリ（例: 開発）" list="cat-list">
    <datalist id="cat-list"></datalist>
    <div class="form-actions">
      <button class="btn-form-save" onclick="addCustomLink()">追加</button>
      <button class="btn-form-cancel" onclick="toggleAddForm()">キャンセル</button>
    </div>
  </div>
</div>

<script src="js/ui/quicklinks.js"></script>
