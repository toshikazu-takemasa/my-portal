<!-- 日記パネル -->
<div id="main-panel-report">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
    <div class="report-tabs !flex !bg-[var(--section-bg)] !rounded-[var(--radius-sm)] !p-0.5 !gap-0.5 !border !border-[var(--border)]">
      <button class="report-tab active !px-3 !py-1 !border-0 !rounded-[5px] !text-[0.76rem] !font-semibold !cursor-pointer !bg-transparent !text-[var(--text-sub)] !transition-all [&.active]:!bg-[var(--card-bg)] [&.active]:!text-[var(--text)] [&.active]:!shadow-[0_1px_3px_rgba(0,0,0,0.06)]" id="tab-preview" onclick="switchTab('preview')">プレビュー</button>
      <button class="report-tab !px-3 !py-1 !border-0 !rounded-[5px] !text-[0.76rem] !font-semibold !cursor-pointer !bg-transparent !text-[var(--text-sub)] !transition-all [&.active]:!bg-[var(--card-bg)] [&.active]:!text-[var(--text)] [&.active]:!shadow-[0_1px_3px_rgba(0,0,0,0.06)]" id="tab-edit" onclick="switchTab('edit')">編集</button>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <button class="regen-btn" id="regen-btn" onclick="regenReport()">↻ 日記を再生成</button>
      <button onclick="fetchDailyReport()" style="padding:4px 9px;border:2px solid #111;border-radius:0;background:#fff;color:#111;font-size:0.76rem;font-weight:700;cursor:pointer;transition:background 0.15s;" onmouseover="this.style.background='#111';this.style.color='#fff';this.style.borderColor='#111'" onmouseout="this.style.background='#fff';this.style.color='#111';this.style.borderColor='#111'">↻ 更新</button>
    </div>
  </div>
  <div id="regen-status" class="is-hidden" style="font-size:0.75rem;color:#8e8e8e;margin-bottom:8px;"></div>

  <div style="margin-bottom:12px;padding-bottom:10px;border-bottom:1px dashed #d7d7d7;">
    <p style="font-size:0.8rem;color:#8e8e8e;line-height:1.5;margin-bottom:10px;">📋 チェックリスト・タスク・確認事項は各画面の「📝 反映」ボタンから追記できます。</p>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
      <button id="ai-reflection-btn" onclick="requestAiReflection()" style="padding:6px 14px;border:2px solid #111;border-radius:0;background:#111;color:#fff;font-size:0.8rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;">
        🤖 AI振り返りをリクエスト
      </button>
      <span id="reflect-status" style="font-size:0.78rem;color:#8e8e8e;"></span>
    </div>
    <div id="reflect-output" class="is-hidden">
      <div class="reflect-result" id="reflect-ai-result"></div>
    </div>
  </div>

  <div id="report-preview" class="report-preview">
    <p class="md-empty">⚙️ 設定から PAT とリポジトリを設定すると日記を表示します</p>
  </div>

  <div id="report-edit" class="is-hidden">
    <textarea id="report-textarea" class="report-editor" placeholder="日記を読み込んでください"></textarea>
    <div class="report-save-bar">
      <button onclick="saveDailyReport()" style="padding:6px 14px;border:2px solid #111;border-radius:0;background:#c6002b;color:#fff;font-size:0.8rem;font-weight:700;cursor:pointer;">保存</button>
      <span id="save-status" style="font-size:0.78rem;color:#8e8e8e;"></span>
    </div>
  </div>

  <div id="report-meta" class="issues-status"></div>
</div>

<script src="js/ui/report.js?v=20260510b"></script>
<script src="js/ui/analytics.js?v=20260510"></script>
